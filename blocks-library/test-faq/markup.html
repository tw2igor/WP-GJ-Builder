<section class="wpb-block wpb-block--faq" data-wpb-block="test-faq">
	<h2 class="wpb-faq__title" data-slot="title">Частые вопросы</h2>
	<div class="wpb-faq__list" data-slot-repeat="items" data-gjs-droppable="false">
		<div class="wpb-faq__item" data-slot-item data-gjs-droppable="false">
			<button type="button" class="wpb-faq__question" data-slot="question" aria-expanded="false">Как быстро вы отвечаете на заявки?</button>
			<div class="wpb-faq__answer" data-slot="answer" data-slot-richtext="1" hidden>Обычно в течение одного рабочего часа, в выходные — до 24 часов.</div>
		</div>
		<div class="wpb-faq__item" data-slot-item data-gjs-droppable="false">
			<button type="button" class="wpb-faq__question" data-slot="question" aria-expanded="false">Можно ли изменить тариф после оплаты?</button>
			<div class="wpb-faq__answer" data-slot="answer" data-slot-richtext="1" hidden>Да, перейти на другой тариф можно в любой момент — разницу пересчитаем автоматически.</div>
		</div>
		<div class="wpb-faq__item" data-slot-item data-gjs-droppable="false">
			<button type="button" class="wpb-faq__question" data-slot="question" aria-expanded="false">Есть ли пробный период?</button>
			<div class="wpb-faq__answer" data-slot="answer" data-slot-richtext="1" hidden>Да, 14 дней бесплатно без привязки карты.</div>
		</div>
	</div>
</section>
